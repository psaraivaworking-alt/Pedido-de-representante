<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Pedidos Pro</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #2ecc71;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #333;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        .container { max-width: 600px; margin: 0 auto; background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 25px; color: var(--primary); }
        
        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9em; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); }

        .product-card { border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 15px; background: #fff; position: relative; }
        .product-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        
        .product-img { width: 75px; height: 75px; background: #f8f8f8; border-radius: 10px; object-fit: cover; border: 1px solid #ddd; cursor: zoom-in; transition: 0.2s; }
        .product-img:hover { transform: scale(1.05); }

        .product-info { flex: 1; }
        .product-info strong { display: block; font-size: 1.1em; }
        .price-tag { color: var(--primary); font-weight: bold; font-size: 0.95em; }

        .variations { display: grid; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); gap: 10px; background: #fcfcfc; padding: 10px; border-radius: 8px; }
        .var-item { display: flex; flex-direction: column; align-items: center; }
        .var-item label { font-size: 0.75em; margin-bottom: 4px; color: #666; font-weight: bold; }
        .var-item input { width: 100%; max-width: 60px; padding: 8px; text-align: center; border: 1px solid #ddd; border-radius: 6px; font-weight: bold; }

        .total-section { background: var(--primary); color: white; padding: 20px; border-radius: 10px; margin-top: 25px; font-size: 1.3em; font-weight: bold; text-align: center; }
        
        button#btnEnviar { width: 100%; padding: 18px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button#btnEnviar:hover { background: #27ae60; }
        button#btnEnviar:disabled { background: #ccc; cursor: not-allowed; }

        #modalFoto { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        #modalFoto img { max-width: 90%; max-height: 80%; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 3px solid white; }
        .fechar-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 45px; font-weight: bold; cursor: pointer; }

        @media (max-width: 480px) { .variations { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 Pedido de Materiais</h2>
    
    <div class="input-group">
        <label>Seu Nome</label>
        <input type="text" id="clienteNome" placeholder="Digite seu nome completo">
    </div>

    <div id="lista-produtos">
        <div class="product-card" data-nome="Boné Roxo" data-preco="15">
            <div class="product-header">
                <img src="https://i.postimg.cc/6Q9YxtSm/imagem-2026-03-04-145046990.png" class="product-img" onclick="abrirFoto(this.src)">
                <div class="product-info"><strong>Boné Roxo</strong><span class="price-tag">R$ 15,00 unid.</span></div>
            </div>
            <div class="variations">
                <div class="var-item"><label>Qtd</label><input type="number" class="qtd" min="0" value="0" onchange="calcularTotal()"></div>
            </div>
        </div>

        <div class="product-card" data-nome="Boné Pescador" data-preco="10">
            <div class="product-header">
                <img src="https://i.postimg.cc/JhL41dcS/imagem-2026-03-04-145832148.png" class="product-img" onclick="abrirFoto(this.src)">
                <div class="product-info"><strong>Boné Pescador</strong><span class="price-tag">R$ 10,00 unid.</span></div>
            </div>
            <div class="variations">
                <div class="var-item"><label>Qtd</label><input type="number" class="qtd" min="0" value="0" onchange="calcularTotal()"></div>
            </div>
        </div>

        <div class="product-card" data-nome="Boné Australiano" data-preco="9">
            <div class="product-header">
                <img src="https://i.postimg.cc/yxts2fNH/imagem-2026-03-04-145918268.png" class="product-img" onclick="abrirFoto(this.src)">
                <div class="product-info"><strong>Boné Australiano</strong><span class="price-tag">R$ 9,00 unid.</span></div>
            </div>
            <div class="variations">
                <div class="var-item"><label>Qtd</label><input type="number" class="qtd" min="0" value="0" onchange="calcularTotal()"></div>
            </div>
        </div>

        <div class="product-card" data-nome="Chaveiro" data-preco="1.80">
            <div class="product-header">
                <img src="https://i.postimg.cc/4d3GyC74/imagem-2026-03-04-145951076.png" class="product-img" onclick="abrirFoto(this.src)">
                <div class="product-info"><strong>Chaveiro</strong><span class="price-tag">R$ 1,80 unid.</span></div>
            </div>
            <div class="variations">
                <div class="var-item"><label>Qtd</label><input type="number" class="qtd" min="0" value="0" onchange="calcularTotal()"></div>
            </div>
        </div>

        <div class="product-card" data-nome="Camisa Manga Curta" data-preco="25">
            <div class="product-header">
                <img src="https://i.postimg.cc/W3tRjMC4/image.png" class="product-img" onclick="abrirFoto(this.src)">
                <div class="product-info"><strong>Camisa Manga Curta</strong><span class="price-tag">R$ 25,00 unid.</span></div>
            </div>
            <div class="variations">
                <div class="var-item"><label>P</label><input type="number" class="qtd" data-v="P" min="0" value="0" onchange="calcularTotal()"></div>
                <div class="var-item"><label>M</label><input type="number" class="qtd" data-v="M" min="0" value="0" onchange="calcularTotal()"></div>
                <div class="var-item"><label>G</label><input type="number" class="qtd" data-v="G" min="0" value="0" onchange="calcularTotal()"></div>
                <div class="var-item"><label>GG</label><input type="number" class="qtd" data-v="GG" min="0" value="0" onchange="calcularTotal()"></div>
                <div class="var-item"><label>XG</label><input type="number" class="qtd" data-v="XG" min="0" value="0" onchange="calcularTotal()"></div>
            </div>
        </div>

        <div class="product-card" data-nome="Camisa Manga Longa" data-preco="25">
            <div class="product-header">
                <img src="https://i.postimg.cc/VkRLkWGm/imagem-2026-03-04-150142972.png" class="product-img" onclick="abrirFoto(this.src)">
                <div class="product-info"><strong>Camisa Manga Longa</strong><span class="price-tag">R$ 25,00 unid.</span></div>
            </div>
            <div class="variations">
                <div class="var-item"><label>P</label><input type="number" class="qtd" data-v="P" min="0" value="0" onchange="calcularTotal()"></div>
                <div class="var-item"><label>M</label><input type="number" class="qtd" data-v="M" min="0" value="0" onchange="calcularTotal()"></div>
                <div class="var-item"><label>G</label><input type="number" class="qtd" data-v="G" min="0" value="0" onchange="calcularTotal()"></div>
                <div class="var-item"><label>GG</label><input type="number" class="qtd" data-v="GG" min="0" value="0" onchange="calcularTotal()"></div>
                <div class="var-item"><label>XG</label><input type="number" class="qtd" data-v="XG" min="0" value="0" onchange="calcularTotal()"></div>
            </div>
        </div>
    </div>

    <div class="total-section">Total: R$ <span id="valorTotal">0,00</span></div>
    <button id="btnEnviar" onclick="enviarPedido()">Finalizar e Enviar 🚀</button>
</div>

<div id="modalFoto" onclick="fecharFoto()">
    <span class="fechar-modal">&times;</span>
    <img id="imgExpandida" src="">
</div>

<script>
    function abrirFoto(src) {
        document.getElementById('imgExpandida').src = src;
        document.getElementById('modalFoto').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function fecharFoto() {
        document.getElementById('modalFoto').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function calcularTotal() {
        let total = 0;
        document.querySelectorAll('.product-card').forEach(card => {
            const preco = parseFloat(card.dataset.preco);
            card.querySelectorAll('.qtd').forEach(input => {
                total += (parseInt(input.value) || 0) * preco;
            });
        });
        document.getElementById('valorTotal').innerText = total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    }

    async function enviarPedido() {
        const nomeInput = document.getElementById('clienteNome');
        const btn = document.getElementById('btnEnviar');
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyjhN9YAZPLFNNpd8Gsa6FvBMlU_bG992V6gWwkRoEncR4uTLf2itCTG4y--Dfc-PQ7/exec"; 

        if (!nomeInput.value.trim()) return alert("Por favor, digite seu nome.");

        let dados = {
            nome: nomeInput.value,
            bone_roxo: 0,
            bone_pescador: 0,
            bone_australiano: 0,
            chaveiro: 0,
            camisa_curta: "",
            camisa_longa: "",
            total: 0
        };

        let totalGeral = 0;
        let temItem = false;

        document.querySelectorAll('.product-card').forEach(card => {
            const nomeProd = card.dataset.nome;
            const preco = parseFloat(card.dataset.preco);
            let qtdCard = 0;
            let detalhes = "";

            card.querySelectorAll('.qtd').forEach(input => {
                const q = parseInt(input.value) || 0;
                if (q > 0) {
                    const v = input.dataset.v || "";
                    if(v) detalhes += `${v}:${q} `;
                    qtdCard += q;
                    totalGeral += q * preco;
                    temItem = true;
                }
            });

            if (nomeProd === "Boné Roxo") dados.bone_roxo = qtdCard;
            if (nomeProd === "Boné Pescador") dados.bone_pescador = qtdCard;
            if (nomeProd === "Boné Australiano") dados.bone_australiano = qtdCard;
            if (nomeProd === "Chaveiro") dados.chaveiro = qtdCard;
            if (nomeProd === "Camisa Manga Curta") dados.camisa_curta = detalhes;
            if (nomeProd === "Camisa Manga Longa") dados.camisa_longa = detalhes;
        });

        if (!temItem) return alert("Selecione pelo menos um item.");
        dados.total = "R$ " + totalGeral.toFixed(2).replace('.', ',');

        try {
            btn.disabled = true;
            btn.innerText = "⏳ Tentando enviar...";

            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), 15000);

            await fetch(URL_SCRIPT, { 
                method: 'POST', 
                mode: 'no-cors', 
                cache: 'no-cache',
                signal: controller.signal,
                body: JSON.stringify(dados) 
            });

            clearTimeout(id);
            alert("✅ Pedido enviado! Verifique sua planilha.");
            location.reload();
        } catch (e) {
            console.error("Erro capturado:", e);
            alert("❌ Erro de conexão ou tempo esgotado. Verifique sua rede.");
            btn.disabled = false;
            btn.innerText = "Finalizar e Enviar 🚀";
        }
    }
</script>
</body>
</html>
